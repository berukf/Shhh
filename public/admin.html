<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>შშშ Admin</title>
<script src="/socket.io/socket.io.js"></script>
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0f0f0f;--surface:#161616;--border:#222;--green:#94D600;
    --red:#FF4E4E;--yellow:#f5a623;--text:#e0e0e0;--muted:#555;
  }
  body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;font-size:14px;min-height:100vh}

  /* LOGIN */
  #login-screen{
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;flex-direction:column;gap:16px;
  }
  #login-screen h1{font-size:24px;color:var(--green);letter-spacing:2px;margin-bottom:8px}
  #login-screen input{
    background:#1a1a1a;border:1.5px solid var(--border);border-radius:8px;
    padding:12px 16px;color:var(--text);font-size:14px;outline:none;width:280px;
    transition:border-color .2s;
  }
  #login-screen input:focus{border-color:var(--green)}
  #login-screen button{
    background:var(--green);color:#111;border:none;border-radius:8px;
    padding:12px 32px;font-size:14px;font-weight:600;cursor:pointer;width:280px;
    transition:background .2s,transform .15s;
  }
  #login-screen button:hover{background:#a8e800;transform:translateY(-1px)}
  #login-error{color:var(--red);font-size:12px;display:none}

  /* DASHBOARD */
  #dashboard{display:none}

  header{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 28px;background:var(--surface);border-bottom:1px solid var(--border);
    position:sticky;top:0;z-index:100;
  }
  header h1{font-size:18px;color:var(--green);letter-spacing:1px}
  .header-right{display:flex;align-items:center;gap:12px}
  .conn-dot{width:8px;height:8px;border-radius:50%;background:var(--red);transition:background .3s}
  .conn-dot.live{background:var(--green)}
  .conn-label{font-size:12px;color:var(--muted)}
  .logout-btn{
    background:transparent;border:1px solid var(--border);color:var(--muted);
    border-radius:6px;padding:6px 14px;cursor:pointer;font-size:12px;
    transition:color .2s,border-color .2s;
  }
  .logout-btn:hover{color:var(--red);border-color:var(--red)}

  .main{display:grid;grid-template-columns:1fr 1fr;gap:0;height:calc(100vh - 57px)}

  /* LEFT — stats + reports */
  .left-col{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}

  /* STATS */
  .stats-row{
    display:grid;grid-template-columns:repeat(3,1fr);gap:0;
    border-bottom:1px solid var(--border);flex-shrink:0;
  }
  .stat{padding:20px 24px;border-right:1px solid var(--border);cursor:default}
  .stat:last-child{border-right:none}
  .stat-val{font-size:28px;font-weight:700;color:var(--green);line-height:1}
  .stat-lbl{font-size:11px;color:var(--muted);margin-top:5px;letter-spacing:.5px;text-transform:uppercase}

  /* REPORTS LIST */
  .section-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 20px;border-bottom:1px solid var(--border);flex-shrink:0;
  }
  .section-title{font-size:13px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted)}
  .badge{
    background:var(--red);color:#fff;border-radius:12px;
    padding:2px 8px;font-size:11px;font-weight:700;
    display:none;
  }
  .badge.show{display:inline}

  .reports-list{flex:1;overflow-y:auto;padding:8px}
  .reports-list::-webkit-scrollbar{width:4px}
  .reports-list::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:4px}

  .report-card{
    background:var(--surface);border:1px solid var(--border);border-radius:10px;
    padding:14px 16px;margin-bottom:8px;cursor:pointer;
    transition:border-color .2s,background .2s;
  }
  .report-card:hover{border-color:#333;background:#1a1a1a}
  .report-card.selected{border-color:var(--green);background:#111}
  .report-card.resolved{opacity:.45}

  .rc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .rc-names{font-size:13px}
  .rc-reporter{color:var(--muted)}
  .rc-arrow{color:var(--red);margin:0 6px}
  .rc-reported{color:var(--red);font-weight:600}
  .rc-time{font-size:11px;color:var(--muted)}
  .rc-meta{font-size:11px;color:var(--muted);margin-top:4px}
  .rc-actions{display:flex;gap:6px;margin-top:10px}

  .btn-sm{
    border:none;border-radius:5px;padding:5px 12px;font-size:11px;
    cursor:pointer;font-weight:600;transition:opacity .2s,transform .1s;
  }
  .btn-sm:hover{opacity:.85;transform:translateY(-1px)}
  .btn-resolve{background:var(--green);color:#111}
  .btn-kick{background:var(--red);color:#fff}
  .btn-view{background:#2a2a2a;color:var(--text)}
  .resolved-tag{
    font-size:10px;background:#1a3a1a;color:var(--green);
    border-radius:4px;padding:2px 7px;font-weight:600;letter-spacing:.5px;
  }
  .empty-state{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    height:200px;color:var(--muted);gap:8px;
  }
  .empty-state svg{opacity:.3}

  /* RIGHT — chat log */
  .right-col{display:flex;flex-direction:column;overflow:hidden}
  .chat-log-area{
    flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:8px;
  }
  .chat-log-area::-webkit-scrollbar{width:4px}
  .chat-log-area::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:4px}

  .log-placeholder{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    height:100%;color:var(--muted);gap:10px;
  }
  .log-placeholder svg{opacity:.25}

  .log-msg{max-width:72%;padding:9px 14px;border-radius:10px;font-size:13px;line-height:1.55;word-break:break-word}
  .log-a{background:#1e2a10;color:#b8e866;align-self:flex-start;border-bottom-left-radius:3px}
  .log-b{background:#2a1e10;color:#e8b866;align-self:flex-end;border-bottom-right-radius:3px}
  .log-meta{font-size:10px;opacity:.6;margin-top:3px;display:block}
  .log-name-a{color:#94D600}
  .log-name-b{color:#f5a623}

  .log-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 20px;border-bottom:1px solid var(--border);flex-shrink:0;
  }
  .log-title{font-size:13px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  .log-chat-id{font-size:11px;color:#333;font-family:monospace}

  /* NOTIFICATION TOAST */
  #toast{
    position:fixed;top:20px;right:20px;z-index:999;
    background:#1a1a1a;border:1px solid var(--red);border-radius:10px;
    padding:14px 18px;max-width:300px;
    transform:translateX(340px);transition:transform .35s cubic-bezier(.34,1.56,.64,1);
    pointer-events:none;
  }
  #toast.show{transform:translateX(0)}
  #toast.green{border-color:var(--green)}
  .toast-title{font-size:12px;font-weight:700;color:var(--red);margin-bottom:4px;letter-spacing:.5px}
  #toast.green .toast-title{color:var(--green)}
  .toast-body{font-size:12px;color:var(--muted)}

  @media(max-width:900px){
    .main{grid-template-columns:1fr}
    .right-col{display:none}
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <h1>შშშ ADMIN</h1>
  <input type="password" id="pw-input" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')doLogin()"/>
  <div id="login-error">Wrong password. Try again.</div>
  <button onclick="doLogin()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <header>
    <h1>⚡ შშშ Admin Panel</h1>
    <div class="header-right">
      <div class="conn-dot" id="conn-dot"></div>
      <span class="conn-label" id="conn-label">Connecting...</span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="main">
    <!-- LEFT -->
    <div class="left-col">
      <div class="stats-row">
        <div class="stat">
          <div class="stat-val" id="s-online">0</div>
          <div class="stat-lbl">Online</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="s-ips">0</div>
          <div class="stat-lbl">Unique IPs</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="s-pairs">0</div>
          <div class="stat-lbl">Active Chats</div>
        </div>
      </div>

      <div class="section-header">
        <span class="section-title">Reports</span>
        <span class="badge" id="unread-badge">0</span>
      </div>

      <div class="reports-list" id="reports-list">
        <div class="empty-state" id="empty-reports">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span>No reports yet</span>
        </div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="right-col">
      <div class="log-header">
        <span class="log-title">Chat Log</span>
        <span class="log-chat-id" id="log-chat-id">— select a report</span>
      </div>
      <div class="chat-log-area" id="chat-log-area">
        <div class="log-placeholder" id="log-placeholder">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span>Click a report to view the chat log</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast">
  <div class="toast-title" id="toast-title">New Report</div>
  <div class="toast-body" id="toast-body"></div>
</div>

<script>
let socket = null;
let adminToken = null;
let reports = [];
let selectedReportId = null;
let unreadCount = 0;

// ── LOGIN ─────────────────────────────────────────────────────
function doLogin() {
  const pw = document.getElementById('pw-input').value.trim();
  if (!pw) return;

  fetch('/api/admin/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: pw }),
  })
  .then(r => r.json())
  .then(data => {
    if (data.token) {
      adminToken = data.token;
      sessionStorage.setItem('admin_token', adminToken);
      showDashboard();
    } else {
      showLoginError();
    }
  })
  .catch(() => showLoginError());
}

function showLoginError() {
  document.getElementById('login-error').style.display = 'block';
  document.getElementById('pw-input').style.borderColor = '#FF4E4E';
}

function logout() {
  adminToken = null;
  sessionStorage.removeItem('admin_token');
  if (socket) socket.disconnect();
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pw-input').value = '';
}

function showDashboard() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  connectSocket();
}

// ── SOCKET ────────────────────────────────────────────────────
function connectSocket() {
  socket = io();

  socket.on('connect', () => {
    socket.emit('admin_join', adminToken);
    setConn(true);
  });

  socket.on('disconnect', () => setConn(false));

  socket.on('admin_auth_fail', () => {
    alert('Auth failed. Please login again.');
    logout();
  });

  socket.on('admin_auth_ok', () => setConn(true));

  socket.on('stats', updateStats);

  socket.on('reports_list', (list) => {
    reports = list;
    renderReports();
  });

  socket.on('new_report', (report) => {
    reports.unshift(report);
    unreadCount++;
    renderReports();
    updateBadge();
    showToast(
      '🚨 New Report',
      `${report.reporterName} reported ${report.reportedName}`,
      false
    );
  });

  socket.on('report_resolved', ({ id }) => {
    const r = reports.find(x => x.id === id);
    if (r) { r.resolved = true; renderReports(); }
  });
}

function setConn(live) {
  document.getElementById('conn-dot').classList.toggle('live', live);
  document.getElementById('conn-label').textContent = live ? 'Live' : 'Disconnected';
}

// ── STATS ─────────────────────────────────────────────────────
function updateStats(s) {
  document.getElementById('s-online').textContent = s.online      ?? 0;
  document.getElementById('s-ips').textContent    = s.uniqueIPs   ?? 0;
  document.getElementById('s-pairs').textContent  = s.activePairs ?? 0;
}

// ── REPORTS ───────────────────────────────────────────────────
function updateBadge() {
  const badge = document.getElementById('unread-badge');
  if (unreadCount > 0) {
    badge.textContent = unreadCount;
    badge.classList.add('show');
  } else {
    badge.classList.remove('show');
  }
}

function renderReports() {
  const container = document.getElementById('reports-list');
  const empty     = document.getElementById('empty-reports');

  if (reports.length === 0) {
    empty.style.display = 'flex';
    // remove any old cards
    container.querySelectorAll('.report-card').forEach(el => el.remove());
    return;
  }
  empty.style.display = 'none';

  // rebuild list
  container.querySelectorAll('.report-card').forEach(el => el.remove());

  reports.forEach(r => {
    const card = document.createElement('div');
    card.className = 'report-card' +
      (r.resolved ? ' resolved' : '') +
      (r.id === selectedReportId ? ' selected' : '');
    card.dataset.id = r.id;

    const time = new Date(r.ts).toLocaleString();

    card.innerHTML = `
      <div class="rc-top">
        <div class="rc-names">
          <span class="rc-reporter">${esc(r.reporterName)}</span>
          <span class="rc-arrow">→</span>
          <span class="rc-reported">${esc(r.reportedName)}</span>
        </div>
        <span class="rc-time">${time}</span>
      </div>
      <div class="rc-meta">
        IP: ${esc(r.reportedIp)} &nbsp;·&nbsp; Chat: ${esc(r.chatId)}
        &nbsp;·&nbsp; ${r.chatLog.length} messages
      </div>
      <div class="rc-actions">
        ${r.resolved
          ? '<span class="resolved-tag">RESOLVED</span>'
          : `<button class="btn-sm btn-resolve" onclick="resolveReport('${r.id}',event)">Resolve</button>
             <button class="btn-sm btn-kick"    onclick="kickUser('${r.reportedSocketId}',event)">Kick</button>`
        }
        <button class="btn-sm btn-view" onclick="viewLog('${r.id}',event)">View Log</button>
      </div>`;

    card.addEventListener('click', () => viewLog(r.id));
    container.appendChild(card);
  });
}

function resolveReport(id, e) {
  if (e) e.stopPropagation();
  fetch(`/api/admin/reports/${id}/resolve`, {
    method: 'POST',
    headers: { 'x-admin-token': adminToken },
  }).then(() => {
    const r = reports.find(x => x.id === id);
    if (r) r.resolved = true;
    renderReports();
    showToast('✅ Resolved', 'Report marked as resolved', true);
  });
}

function kickUser(socketId, e) {
  if (e) e.stopPropagation();
  if (!socketId || socketId === 'undefined') return alert('User is no longer connected.');
  fetch(`/api/admin/kick/${socketId}`, {
    method: 'POST',
    headers: { 'x-admin-token': adminToken },
  }).then(r => r.json()).then(d => {
    if (d.ok) showToast('👢 Kicked', 'User has been disconnected', false);
    else alert('User is no longer connected.');
  });
}

function viewLog(id, e) {
  if (e) e.stopPropagation();
  selectedReportId = id;
  renderReports(); // update selected highlight

  const r = reports.find(x => x.id === id);
  if (!r) return;

  document.getElementById('log-chat-id').textContent = r.chatId;
  const area = document.getElementById('chat-log-area');
  const placeholder = document.getElementById('log-placeholder');

  if (r.chatLog.length === 0) {
    placeholder.style.display = 'flex';
    placeholder.querySelector('span').textContent = 'No messages in this chat yet.';
    area.querySelectorAll('.log-msg-wrap').forEach(el => el.remove());
    return;
  }

  placeholder.style.display = 'none';
  area.querySelectorAll('.log-msg-wrap').forEach(el => el.remove());

  // figure out two participants
  const names = [...new Set(r.chatLog.map(m => m.from))];
  const nameA = names[0];

  r.chatLog.forEach(m => {
    const isA = m.from === nameA;
    const wrap = document.createElement('div');
    wrap.className = 'log-msg-wrap';
    wrap.style.display = 'flex';
    wrap.style.flexDirection = 'column';
    wrap.style.alignItems = isA ? 'flex-start' : 'flex-end';

    const bubble = document.createElement('div');
    bubble.className = 'log-msg ' + (isA ? 'log-a' : 'log-b');
    bubble.innerHTML = `${esc(m.text)}<span class="log-meta"><span class="${isA ? 'log-name-a' : 'log-name-b'}">${esc(m.from)}</span> · ${new Date(m.ts).toLocaleTimeString()}</span>`;
    wrap.appendChild(bubble);
    area.appendChild(wrap);
  });

  area.scrollTop = area.scrollHeight;

  // clear unread
  unreadCount = 0;
  updateBadge();
}

// ── TOAST ─────────────────────────────────────────────────────
let toastTimer = null;
function showToast(title, body, green) {
  const toast = document.getElementById('toast');
  document.getElementById('toast-title').textContent = title;
  document.getElementById('toast-body').textContent  = body;
  toast.className = green ? 'green show' : 'show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 4000);
}

// ── UTILS ──────────────────────────────────────────────────────
function esc(str) {
  return String(str || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── AUTO LOGIN IF SESSION TOKEN EXISTS ────────────────────────
(function() {
  const saved = sessionStorage.getItem('admin_token');
  if (saved) {
    adminToken = saved;
    showDashboard();
  }
})();
</script>
</body>
</html>
