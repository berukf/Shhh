*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--green:#94D600;--red:#FF4E4E;--bg:#1c1c1c;--sb:#181818;--chat:#1e1e1e;--border:#2a2a2a;--inp:#252525}
html,body{height:100%;background:var(--bg);color:#fff;font-family:'BPGBanner',sans-serif;overflow:hidden}

nav{display:flex;align-items:center;justify-content:space-between;padding:18px 48px;background:var(--bg);border-bottom:1px solid var(--border);height:68px;z-index:20;position:relative}
.logo{font-family:'DachiTheLynx',sans-serif;color:var(--green);font-size:26px;text-decoration:none}
.blink{animation:blink 1.1s step-start infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.nav-links{display:flex;align-items:center;gap:32px;list-style:none}
.nav-links a{color:#fff;text-decoration:none;font-size:12px;letter-spacing:.4px;transition:color .2s}
.nav-links a:hover{color:var(--green)}
.nav-links .active::before{content:'● ';color:var(--green);font-size:9px}

.layout{display:flex;height:calc(100vh - 68px);overflow:hidden;min-width:0}

.sidebar{width:190px;min-width:190px;background:var(--sb);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 0 16px}
.sb-user{display:flex;align-items:center;gap:10px;padding:0 20px 20px;border-bottom:1px solid var(--border);margin-bottom:8px}
.sb-user svg{color:#888;flex-shrink:0}
.sb-name{font-size:13px;color:#fff;letter-spacing:.3px}
.sb-nav{display:flex;flex-direction:column;gap:2px;padding:8px 12px}
.sb-nav a{color:#888;text-decoration:none;font-size:12px;letter-spacing:.3px;padding:8px 10px;border-radius:6px;transition:color .2s,background .2s}
.sb-nav a:hover{color:#fff;background:#222}
.sb-online{font-size:11px;color:#555;padding:14px 20px 0;letter-spacing:.3px}
.sb-online span{color:var(--green)}

.chat-area{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--chat);overflow:hidden;position:relative}

.chat-header{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:2px solid var(--green);flex-shrink:0;z-index:2}
.stranger-info{display:flex;align-items:center;gap:12px}
.avatar{width:36px;height:36px;border-radius:50%;background:#2a2a2a;border:1.5px solid #383838;display:flex;align-items:center;justify-content:center;color:#555;transition:border-color .4s,color .4s}
.avatar.found{border-color:var(--green);color:#999}
.stranger-name{font-size:13px;color:#aaa;letter-spacing:.3px}
.hdr-btns{display:flex;align-items:center;gap:8px}

.btn{display:flex;align-items:center;gap:7px;border:none;border-radius:6px;padding:10px 16px;font-family:'BPGBanner',sans-serif;font-size:12px;letter-spacing:.4px;cursor:pointer;transition:transform .15s,box-shadow .2s,background .2s}
.btn:hover{transform:translateY(-1px)}
.btn-grey{background:#2a2a2a;color:#aaa;border:1px solid #383838}
.btn-grey:hover{background:#333;color:#fff}
.btn-red{background:#3a1515;color:var(--red);border:1px solid #5a2020}
.btn-red:hover{background:#4a1a1a;box-shadow:0 4px 14px rgba(255,78,78,.2)}
.btn-green{background:var(--green);color:#1a1a1a}
.btn-green:hover{background:#a8e800;box-shadow:0 4px 14px rgba(148,214,0,.3)}

#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;background:var(--chat);z-index:10;transition:opacity .5s ease}
#overlay.hide{opacity:0;pointer-events:none}
.spinner{width:44px;height:44px;border:3px solid #2a2a2a;border-top-color:var(--green);border-radius:50%;animation:spin .85s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-label{font-size:12px;color:#555;letter-spacing:1.5px;text-transform:uppercase}
.spin-label .dot{color:var(--green);animation:blink 1.1s step-start infinite}

.messages{flex:1;overflow-y:auto;overflow-x:hidden;min-height:0;min-width:0;display:flex;flex-direction:column;justify-content:flex-end;padding:20px 24px 8px}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:#333;border-radius:4px}
.msgs-inner{display:flex;flex-direction:column;gap:8px;width:100%;min-width:0}

.sys{display:flex;align-items:center;gap:8px;font-size:12px;color:#555;letter-spacing:.3px;padding:2px 0}
.sys::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.sys.red::before{background:var(--red)}

.msg{max-width:68%;padding:11px 16px;font-size:13px;line-height:1.65;letter-spacing:.2px;border-radius:12px;animation:pop .22s ease both;word-break:break-word;overflow-wrap:break-word;white-space:pre-wrap}
@keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-them{background:#252525;color:#ddd;border-bottom-left-radius:4px;align-self:flex-start}
.msg-me{background:var(--green);color:#1a1a1a;border-bottom-right-radius:4px;align-self:flex-end}

.typing-ind{display:none;align-items:center;gap:4px;padding:8px 14px;background:#252525;border-radius:12px;border-bottom-left-radius:4px;align-self:flex-start;animation:pop .22s ease both}
.typing-ind.show{display:flex}
.td{width:6px;height:6px;border-radius:50%;background:#666;animation:bounce 1.2s ease infinite}
.td:nth-child(2){animation-delay:.2s}
.td:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

.new-chat-btn{align-self:flex-start;background:var(--green);color:#1a1a1a;border:none;border-radius:8px;padding:12px 22px;font-family:'BPGBanner',sans-serif;font-size:12px;letter-spacing:.5px;cursor:pointer;animation:pop .25s ease both;transition:background .2s,transform .15s;margin-top:4px}
.new-chat-btn:hover{background:#a8e800;transform:translateY(-1px)}

.input-bar{display:flex;align-items:center;gap:10px;padding:14px 20px;background:var(--chat);border-top:1px solid var(--border);flex-shrink:0}
.msg-input{flex:1;background:var(--inp);border:1.5px solid var(--border);border-radius:8px;padding:14px 18px;color:#ccc;font-family:'BPGBanner',sans-serif;font-size:13px;outline:none;transition:border-color .2s;letter-spacing:.3px}
.msg-input::placeholder{color:#555}
.msg-input:focus{border-color:#3a3a3a}
.msg-input:disabled{opacity:.4;cursor:not-allowed}
.send-btn{width:44px;height:44px;border-radius:8px;background:var(--green);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#1a1a1a;flex-shrink:0;transition:background .2s,transform .15s}
.send-btn:hover{background:#a8e800;transform:translateY(-1px)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

@media(max-width:768px){.sidebar{display:none}nav{padding:16px 20px}}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">შშშ..<span class="blink">.</span></a>
  <ul class="nav-links">
    <li class="active"><a href="#" id="nav-count">0 ონლაინ</a></li>
    <li><a href="#">ჩვენს შესახებ</a></li>
    <li><a href="#">წესები</a></li>
    <li><a href="#">დახმარება</a></li>
  </ul>
</nav>

<div class="layout">
  <aside class="sidebar">
    <div class="sb-user">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span class="sb-name" id="sb-name">User</span>
    </div>
    <nav class="sb-nav">
      <a href="/entrance.html">სახელი შეცვლა</a>
      <a href="#">პარამეტრები</a>
    </nav>
    <div class="sb-online">ონლაინ: <span id="sb-online">0</span></div>
  </aside>

  <div class="chat-area">
    <div class="chat-header">
      <div class="stranger-info">
        <div class="avatar" id="avatar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <span class="stranger-name" id="stranger-name">ეძებს...</span>
      </div>
      <div class="hdr-btns" id="hdr-btns"></div>
    </div>

    <div id="overlay">
      <div class="spinner"></div>
      <div class="spin-label">ეძებს სტრეინჯერს<span class="dot">...</span></div>
    </div>

    <div class="messages" id="messages">
      <div class="msgs-inner" id="msgs-inner">
        <div class="typing-ind" id="typing-ind">
          <div class="td"></div><div class="td"></div><div class="td"></div>
        </div>
      </div>
    </div>

    <div class="input-bar">
      <input class="msg-input" id="msg-input" type="text" placeholder="შეიყვანე შეტყობინება" disabled onkeydown="if(event.key==='Enter')send()"/>
      <button class="send-btn" id="send-btn" onclick="send()" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
const myName   = localStorage.getItem('sss_name')   || 'User';
const myGender = localStorage.getItem('sss_gender') || '';
const myAge    = localStorage.getItem('sss_age')    || '';
document.getElementById('sb-name').textContent = myName;

const socket = io();
let chatState = 'searching';
let typingTimer = null;

// ── realtime events ──────────────────────────────────────
socket.on('online_count', n => {
  document.getElementById('sb-online').textContent = n;
  document.getElementById('nav-count').textContent = n + ' ონლაინ';
});
socket.on('matched',      d  => { applyState('chatting', d.strangerName); addSys(d.strangerName + ' joined the chat', false); });
socket.on('message',      d  => { hideTyping(); addMsg(d.text, false); });
socket.on('typing',       ()  => showTyping());
socket.on('stop_typing',  ()  => hideTyping());
socket.on('stranger_left',() => {
  const n = document.getElementById('stranger-name').textContent;
  applyState('ended');
  addSys(n + ' left the chat', true);
  addNewChatBtn();
});

// ── typing emit ──────────────────────────────────────────
document.getElementById('msg-input').addEventListener('input', () => {
  socket.emit('typing');
  clearTimeout(typingTimer);
  typingTimer = setTimeout(() => socket.emit('stop_typing'), 1500);
});

// ── state ────────────────────────────────────────────────
function applyState(s, name) {
  chatState = s;
  const overlay = document.getElementById('overlay');
  const input   = document.getElementById('msg-input');
  const sendBtn = document.getElementById('send-btn');
  const avatar  = document.getElementById('avatar');
  const sName   = document.getElementById('stranger-name');
  const btns    = document.getElementById('hdr-btns');

  const chevron = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`;
  const infoIco = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
  const leaveIco= `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>`;

  if (s === 'searching') {
    overlay.classList.remove('hide');
    input.disabled = true; sendBtn.disabled = true;
    avatar.classList.remove('found');
    sName.textContent = 'ეძებს...';
    btns.innerHTML = `<button class="btn btn-green" onclick="startSearch()">დაწყება ${chevron}</button>`;
  } else if (s === 'chatting') {
    overlay.classList.add('hide');
    input.disabled = false; sendBtn.disabled = false;
    avatar.classList.add('found');
    sName.textContent = name || 'სტრეინჯერი';
    input.focus();
    btns.innerHTML = `
      <button class="btn btn-grey"  onclick="reportStranger()">რეპორტი ${infoIco}</button>
      <button class="btn btn-red"   onclick="leaveChat()">გასვლა ${leaveIco}</button>
      <button class="btn btn-green" onclick="nextStranger()">შემდეგი ${chevron}</button>`;
  } else if (s === 'ended') {
    input.disabled = true; sendBtn.disabled = true;
    btns.innerHTML = `<button class="btn btn-green" onclick="nextStranger()">შემდეგი ${chevron}</button>`;
  }
}

// ── message helpers ──────────────────────────────────────
function insertBefore(el) {
  const inner  = document.getElementById('msgs-inner');
  const typing = document.getElementById('typing-ind');
  inner.insertBefore(el, typing);
  document.getElementById('messages').scrollTop = 9999;
}
function addSys(text, isLeave) {
  const d = document.createElement('div');
  d.className = 'sys' + (isLeave ? ' red' : '');
  d.textContent = text;
  insertBefore(d);
}
function addMsg(text, isMe) {
  hideTyping();
  const d = document.createElement('div');
  d.className = 'msg ' + (isMe ? 'msg-me' : 'msg-them');
  d.textContent = text;
  insertBefore(d);
}
function addNewChatBtn() {
  const b = document.createElement('button');
  b.className = 'new-chat-btn';
  b.textContent = 'საახლო ჩატი';
  b.onclick = nextStranger;
  insertBefore(b);
}
function showTyping() { document.getElementById('typing-ind').classList.add('show'); document.getElementById('messages').scrollTop = 9999; }
function hideTyping() { document.getElementById('typing-ind').classList.remove('show'); }
function clearMsgs()  {
  const inner = document.getElementById('msgs-inner');
  const t = document.getElementById('typing-ind');
  inner.innerHTML = ''; inner.appendChild(t); hideTyping();
}

// ── actions ──────────────────────────────────────────────
function startSearch()   { clearMsgs(); applyState('searching'); socket.emit('find_stranger', {name:myName,gender:myGender,age:myAge}); }
function nextStranger()  { clearMsgs(); applyState('searching'); socket.emit('next',          {name:myName,gender:myGender,age:myAge}); }
function leaveChat()     { socket.emit('leave_chat'); applyState('ended'); addSys(myName + ' left the chat', true); addNewChatBtn(); }
function reportStranger(){ socket.emit('report'); const b=document.querySelector('.btn-grey'); if(b){b.style.color='var(--red)';b.textContent='გაიგზავნა';} }
function send() {
  if (chatState !== 'chatting') return;
  const inp = document.getElementById('msg-input');
  const txt = inp.value.trim(); if (!txt) return;
  socket.emit('message', {text: txt});
  addMsg(txt, true);
  inp.value = '';
  socket.emit('stop_typing');
  clearTimeout(typingTimer);
}

// ── boot ─────────────────────────────────────────────────
applyState('searching');
socket.emit('find_stranger', {name:myName, gender:myGender, age:myAge});
</script>
</body>
</html>
